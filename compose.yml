services:
  rustvoice:
    build:
      dockerfile: ./Dockerfile
    volumes:
      - ./db.sqlite:/opt/moncorp-rustvoice/db.sqlite
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN}"
      DISCORD_SERVER_ID: "${DISCORD_SERVER_ID}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:db.sqlite}"
      RUST_LOG: "${RUST_LOG:-warning}"
